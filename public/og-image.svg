    <path d='M60 0 L85 40 L130 50 L95 90 L105 140 L60 120 L15 140 L25 90 L-10 50 L35 40 Z' fill='url(#gold)' opacity='0.3'/>
  </g>

  <!-- Title -->
  <text x='600' y='380' font-family='serif' font-size='72' font-weight='bold' fill='url(#gold)' text-anchor='middle'>Patricia Taques</text>

  <!-- Subtitle -->
  <text x='600' y='450' font-family='sans-serif' font-size='32' fill='#A1A1AA' text-anchor='middle'>Tarot Reader & Spiritual Guide</text>

  <!-- Decorative line -->
