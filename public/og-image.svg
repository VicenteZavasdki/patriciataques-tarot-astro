      <stop offset='0%' style='stop-color:#0A0A0B'/>
      <stop offset='100%' style='stop-color:#111113'/>
    </linearGradient>
    <linearGradient id='gold' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#F5C842'/>
      <stop offset='100%' style='stop-color:#D4A12C'/>
    </linearGradient>
  </defs>

  <rect width='1200' height='630' fill='url(#bg)'/>

  <!-- Decorative circles -->
  <circle cx='100' cy='100' r='200' fill='#D4A12C' opacity='0.05'/>
  <circle cx='1100' cy='530' r='250' fill='#D4A12C' opacity='0.05'/>

  <!-- Logo/Icon -->
