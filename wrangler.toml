name = \"patriciataques-tarot-astro\"
main = \"dist/server/entry.mjs\"
compatibility_date = \"2026-04-22\"

# Routes configuration
routes = [
  { pattern = \"patriciataques.com\", zone_name = \"patriciataques.com\" },
  { pattern = \"www.patriciataques.com\", zone_name = \"patriciataques.com\" }
]

# Assets
assets = { directory = \"dist/client\" }

# Observability
[observability]
enabled = false

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

# KV Namespace for sessions
[[kv_namespaces]]
binding = \"SESSION\"
id = \"\"  # Will be bound to existing namespace